name: Backend Smoke Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - backend/**
      - .github/workflows/smoke.yml

jobs:
  smoke:
    name: Run Smoke Flow
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      PORT: "5000"
      MONGO_URI: ${{ secrets.MONGO_URI }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
      CORS_ORIGIN: http://localhost:5173
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        run: |
          missing=0
          for key in MONGO_URI JWT_SECRET JWT_EXPIRES_IN CLOUDINARY_CLOUD_NAME CLOUDINARY_API_KEY CLOUDINARY_API_SECRET; do
            value="${!key}"
            if [ -z "$value" ]; then
              echo "Missing required secret: $key"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Start backend server
        run: |
          nohup npm run start > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for health endpoint
        run: |
          for i in {1..30}; do
            if curl -fsS "http://localhost:5000/api/v1/health" > /dev/null; then
              echo "Server is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Server failed health check in time"
          exit 1

      - name: Install Newman
        run: npm install -g newman

      - name: Run API smoke test (Postman Collection)
        env:
          NEWMAN_DISABLE_UNICODE: "1"
        run: |
          newman run postman/Capstone-Monitoring-System.postman_collection.json \
            --folder "Health" \
            --folder "Auth" \
            --folder "Users" \
            --folder "Teams" \
            --folder "Schedules" \
            --folder "Task Submissions" \
            --folder "Announcements" \
            --reporters cli \
            --bail

      - name: Stop backend server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
          fi

      - name: Upload backend server logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-server-log
          path: backend/server.log
          if-no-files-found: ignore
